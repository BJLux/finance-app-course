<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniWealth</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="hero">
        <div class="hero-label">Net Worth</div>
        <div class="hero-amount" id="netWorth">—</div>
        <div class="hero-breakdown">
          <span><span class="dot dot-cash"></span> Cash <strong id="cashBalance">—</strong></span>
          <span><span class="dot dot-stocks"></span> Stocks <strong id="portfolioValue">—</strong></span>
          <span id="totalReturnRow" class="hidden">Return <strong id="totalReturn">—</strong></span>
        </div>
      </header>

      <section class="card">
        <div class="card-head">
          <h2>Portfolio</h2>
          <span class="muted" id="portfolioMeta"></span>
        </div>
        <div id="holdingsArea">
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Recent transactions</h2>
          <span class="muted" id="transactionsMeta"></span>
        </div>
        <div id="transactionsArea">
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Top expense categories</h2>
        </div>
        <div id="categoriesArea"><div class="empty">No expenses yet.</div></div>
      </section>
    </main>

    <button id="quickAddBtn" class="fab" aria-label="Quick Add">+</button>

    <div id="modalOverlay" class="overlay hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-head">
          <h3 id="modalTitle">Quick Add</h3>
          <button id="modalClose" class="icon-btn" aria-label="Close">×</button>
        </div>

        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="income">Income</button>
          <button class="tab" data-tab="expense">Expense</button>
          <button class="tab" data-tab="trade">Trade</button>
          <button class="tab" data-tab="price">Update price</button>
        </div>

        <div id="formError" class="form-error hidden"></div>

        <form id="formIncome" class="tab-pane active" data-pane="income">
          <label>Amount (€)
            <input type="number" name="amount" step="0.01" min="0.01" required />
          </label>
          <label>Category
            <input type="text" name="category" placeholder="e.g. Salary, Freelance" required />
          </label>
          <label>Date
            <input type="date" name="date" required />
          </label>
          <label>Note (optional)
            <input type="text" name="note" />
          </label>
          <button type="submit" class="primary">Add income</button>
        </form>

        <form id="formExpense" class="tab-pane" data-pane="expense">
          <label>Amount (€)
            <input type="number" name="amount" step="0.01" min="0.01" required />
          </label>
          <label>Category
            <input type="text" name="category" placeholder="e.g. Food, Rent, Transport" required />
          </label>
          <label>Date
            <input type="date" name="date" required />
          </label>
          <label>Note (optional)
            <input type="text" name="note" />
          </label>
          <button type="submit" class="primary">Add expense</button>
        </form>

        <form id="formTrade" class="tab-pane" data-pane="trade">
          <label>Ticker
            <input type="text" name="ticker" placeholder="e.g. AAPL" maxlength="10" required />
          </label>
          <label>Type
            <select name="type" required>
              <option value="BUY">Buy</option>
              <option value="SELL">Sell</option>
            </select>
          </label>
          <label>Shares
            <input type="number" name="shares" step="0.000001" min="0.000001" required />
          </label>
          <label>Price per share (€)
            <input type="number" name="price" step="0.01" min="0.01" required />
          </label>
          <label>Date
            <input type="date" name="date" required />
          </label>
          <button type="submit" class="primary">Save trade</button>
        </form>

        <form id="formPrice" class="tab-pane" data-pane="price">
          <p class="hint">Update the current market price of a ticker you own. This recalculates net worth.</p>
          <label>Ticker
            <input type="text" name="ticker" placeholder="e.g. AAPL" maxlength="10" required />
          </label>
          <label>Current price (€)
            <input type="number" name="price" step="0.01" min="0.01" required />
          </label>
          <button type="submit" class="primary">Update price</button>
        </form>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
